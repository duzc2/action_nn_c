<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action NN-C 可视化网络编辑器</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 引入 Rete.js 1.x -->
    <script src="https://cdn.jsdelivr.net/npm/rete@1.4.5/build/rete.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/rete-connection-plugin@0.9.0/build/connection-plugin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/rete-area-plugin@1.4.5/build/area-plugin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/rete-render-plugin@0.6.2/build/render-plugin.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 左侧工具栏 -->
        <div class="sidebar">
            <h2>组件库</h2>
            <div class="component-list">
                <div class="component-item" data-type="input">
                    <span class="icon">📥</span>
                    <span>输入层 (Input)</span>
                </div>
                <div class="component-item" data-type="dense">
                    <span class="icon">🔵</span>
                    <span>全连接层 (Dense)</span>
                </div>
                <div class="component-item" data-type="conv2d">
                    <span class="icon">🟦</span>
                    <span>卷积层 (Conv2D)</span>
                </div>
                <div class="component-item" data-type="pooling">
                    <span class="icon">🔽</span>
                    <span>池化层 (Pooling)</span>
                </div>
                <div class="component-item" data-type="activation">
                    <span class="icon">⚡</span>
                    <span>激活函数 (Activation)</span>
                </div>
                <div class="component-item" data-type="dropout">
                    <span class="icon">🚫</span>
                    <span>Dropout</span>
                </div>
                <div class="component-item" data-type="flatten">
                    <span class="icon">➖</span>
                    <span>展平层 (Flatten)</span>
                </div>
                <div class="component-item" data-type="output">
                    <span class="icon">📤</span>
                    <span>输出层 (Output)</span>
                </div>
                <div class="component-item" data-type="transformer_block">
                    <span class="icon">🔄</span>
                    <span>Transformer Block</span>
                </div>
                <div class="component-item" data-type="rnn_lstm">
                    <span class="icon">🔁</span>
                    <span>LSTM/RNN</span>
                </div>
                <div class="component-item" data-type="gnn_conv">
                    <span class="icon">🕸️</span>
                    <span>图卷积 (GNN)</span>
                </div>
            </div>
            
            <div class="config-section">
                <h3>全局配置</h3>
                <div class="form-group">
                    <label>网络名称:</label>
                    <input type="text" id="network-name" value="my_network" />
                </div>
                <div class="form-group">
                    <label>网络类型:</label>
                    <select id="network-type">
                        <option value="mlp">MLP (多层感知机)</option>
                        <option value="cnn">CNN (卷积神经网络)</option>
                        <option value="transformer">Transformer</option>
                        <option value="rnn">RNN/LSTM</option>
                        <option value="gnn">GNN (图神经网络)</option>
                    </select>
                </div>
            </div>
            
            <div class="action-buttons">
                <button id="export-btn" class="btn btn-primary">导出配置</button>
                <button id="import-btn" class="btn btn-secondary">导入配置</button>
                <button id="clear-btn" class="btn btn-danger">清空画布</button>
                <button id="generate-code-btn" class="btn btn-success">生成 C 代码</button>
            </div>
        </div>
        
        <!-- 中间画布区域 -->
        <div class="main-content">
            <div id="editor" class="editor-canvas"></div>
        </div>
        
        <!-- 右侧属性面板 -->
        <div class="properties-panel" id="properties-panel">
            <h2>属性配置</h2>
            <div id="properties-content">
                <p class="hint">点击画布中的节点以编辑属性</p>
            </div>
        </div>
    </div>
    
    <!-- 导出模态框 -->
    <div id="export-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>导出配置</h2>
            <textarea id="export-output" readonly></textarea>
            <div class="modal-actions">
                <button id="download-json-btn" class="btn btn-primary">下载 JSON</button>
                <button id="copy-json-btn" class="btn btn-secondary">复制 JSON</button>
            </div>
        </div>
    </div>
    
    <!-- 生成的代码模态框 -->
    <div id="code-modal" class="modal">
        <div class="modal-content large">
            <span class="close">&times;</span>
            <h2>生成的配置头文件</h2>
            <pre><code id="generated-code"></code></pre>
            <div class="modal-actions">
                <button id="copy-code-btn" class="btn btn-secondary">复制代码</button>
            </div>
        </div>
    </div>
    
    <script src="js/nodes.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>
